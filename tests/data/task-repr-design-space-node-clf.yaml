model:
  num_mp_layers: 1
  global_pooling: null
  normalize_adj: [false, true]
  layer_type: ["gcnconv", "ginconv"]
  dim_inner: [64, 128]
  act: ['prelu', 'relu']
  use_batchnorm: true
  pooling: null
  post_mp_dims:
    - '64,32'
    - '32, 16'
train:
  optim:
    optimizer: adam
    base_lr: 0.01
  lr_schedule:
    type: null
  max_epoch: [10, 100]
data_loader:
  graph_const: knn
  knn_k: 20
  radius_ratio: null
  batch_size: 32
