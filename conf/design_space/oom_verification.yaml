# Minimal design space that reproduces CUDA OOM from sweep-all-20260320-195223
# (experiment 163217529480358663) — gastric-bladder-cancer + radius + sageconv + mincut
# Use with: python run_rct.py design_space=oom_verification resource=gpu-1 sample_size=2
model:
  num_mp_layers: 1
  global_pooling: mean
  normalize_adj: false
  layer_type: sageconv
  dim_inner: 512
  act: relu
  use_batchnorm: false
  pooling:
    type: mincut
    n_clusters: 10
  post_mp_dims: '64,32'
train:
  optim:
    optimizer: sgd
    base_lr: 0.1
  lr_schedule:
    type: null
  max_epoch: 5
data_loader:
  graph_const: radius
  radius_ratio: 0.075
  knn_k: 10
  batch_size: 256
task:
  type: graph-classification
  dataset_name: mouse-preoptic
