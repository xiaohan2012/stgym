# Profiling config: large dataset (mouse-kidney) + radius graph construction
# mouse-kidney: 85 graphs, mean 23757 nodes/graph
data_loader:
  batch_size: 16
  device: cuda
  graph_const: radius
  knn_k: 10
  num_workers: 0
  radius_ratio: 0.1
  split:
    test_ratio: 0.15
    train_ratio: 0.7
    val_ratio: 0.15
model:
  global_pooling: mean
  mem:
    inplace: false
  mp_layers:
  - act: relu
    bn_eps: 1.0e-05
    bn_momentum: 0.1
    dim_inner: 64
    dropout: 0.0
    has_bias: false
    l2norm: false
    layer_type: gcnconv
    normalize_adj: false
    pooling: null
    readout: mean
    use_batchnorm: true
  post_mp_layer:
    act: relu
    bn_eps: 1.0e-05
    bn_momentum: 0.1
    dims:
    - 32
    dropout: 0.0
    has_bias: false
    l2norm: false
    use_batchnorm: true
task:
  dataset_name: mouse-kidney
  num_classes: 3
  type: graph-classification
train:
  lr_schedule:
    max_epoch: 5
    type: null
  max_epoch: 5
  optim:
    base_lr: 0.001
    momentum: 0.9
    optimizer: adam
    weight_decay: 0.0005
