services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/repo
      - ~/.ssh:/root/.ssh:ro
    environment:
      - GH_TOKEN
      - CLAUDE_CODE_OAUTH_REFRESH_TOKEN
      - CLAUDE_CODE_OAUTH_SCOPES=user:profile user:inference user:sessions:claude_code
    working_dir: /repo
    command: bash -c "uv sync --group dev && bash"
    stdin_open: true
    tty: true
